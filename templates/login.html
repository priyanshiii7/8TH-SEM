<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — StudyMate AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
          <path d="M14 2L26 8V20L14 26L2 20V8L14 2Z" stroke="currentColor" stroke-width="2" fill="none"/>
          <path d="M14 7L21 11V17L14 21L7 17V11L14 7Z" fill="currentColor" opacity="0.3"/>
          <circle cx="14" cy="14" r="3" fill="currentColor"/>
        </svg>
      </div>
      <span class="logo-text" style="font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem">StudyMate</span>
      <span class="logo-tag">AI</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to continue your study journey</p>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="input" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="input" placeholder="••••••••">
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn-primary w-full" style="justify-content:center;margin-top:8px" onclick="handleLogin()" id="loginBtn">
      Sign In
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one →</a>
    </div>
  </div>
</div>
<script>
async function handleLogin() {
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  btn.innerHTML = '<span class="loader"></span>';
  btn.disabled = true;
  err.textContent = '';

  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    })
  });
  const data = await res.json();
  if (data.success) {
    window.location.href = '/dashboard';
  } else {
    err.textContent = data.error || 'Login failed';
    btn.innerHTML = 'Sign In';
    btn.disabled = false;
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
